---
aid: aalto
name: Aalto University
description: >-
  Aalto University is a multidisciplinary public research university in Espoo,
  Finland, formed in 2010 from the merger of three institutions and ranked #113
  in the QS World University Rankings 2025. Its public developer footprint is
  modest and mostly research- or open-data-oriented: an authentication-gated
  Aalto API Gateway (3scale) exposing course/student information system APIs
  such as the Open Courses (SISU) API, a Linked Open Aalto Data service offering
  a public SPARQL endpoint, and the Aaltodoc institutional repository (DSpace)
  with public OAI-PMH and REST access. Active open-source development is
  published primarily through the AaltoSciComp GitHub organization.
type: Index
position: Consumer
access: 3rd-Party
